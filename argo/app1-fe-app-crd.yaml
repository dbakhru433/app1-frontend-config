apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1-frontend-app
  namespace: argocd
spec:
  project: app1-project
  source:
    # URL for your frontend config repo
    repoURL: 'https://github.com/dbakhru433/app1-frontend-config.git'
    targetRevision: HEAD
    path: frontend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: app1-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true